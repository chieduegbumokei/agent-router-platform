name: Deploy backend (SAM)

# Continuous delivery for the serverless backend (API Gateway + Lambda +
# DynamoDB) defined in backend/template.yaml.
#
# Manual on purpose: deploys touch live AWS infrastructure, so this never fires
# automatically on a push. Trigger it from the Actions tab ("Run workflow")
# after CI is green. To make it fully continuous later, add a `push:` trigger
# (e.g. on tags matching `v*`) — the job body stays the same.
on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: CloudFormation stack name
        required: true
        default: assistant-platform
      aws_region:
        description: AWS region to deploy to
        required: true
        default: us-east-1

# OIDC: lets the job assume an AWS IAM role without long-lived access keys.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.stack_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    # Configure a "production" environment in repo Settings → Environments to
    # require a manual approval before this job runs, and to scope the secrets
    # below to it.
    environment: production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Create an IAM role with a GitHub OIDC trust policy and give it
          # deploy permissions (CloudFormation, Lambda, API Gateway, DynamoDB,
          # IAM, S3). Store its ARN as the AWS_DEPLOY_ROLE_ARN secret.
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name "${{ github.event.inputs.stack_name }}" \
            --region "${{ github.event.inputs.aws_region }}" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              JwtSecret="${{ secrets.JWT_SECRET }}" \
              FrontendOrigin="${{ secrets.FRONTEND_ORIGIN }}" \
              TavilyApiKey="${{ secrets.TAVILY_API_KEY }}"
